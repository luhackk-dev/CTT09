name: CI Pipeline

on: [push, pull_request]

jobs:
  verificar-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install fastapi uvicorn pytest httpx
      - name: Rodar Testes
        run: pytest
