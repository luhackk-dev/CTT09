name: Teste de API

on: [push]

jobs:
  verificar-api:

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar Testes
        run: pytest test_main.py

      - name: Rodar Testes (Unitários)
        run: pytest test_main.py

      - name: Subir a API e testar requisição (Integração)
        run: |
          # O '&' faz o FastAPI rodar sem travar o terminal do Runner
          fastapi run main.py --port 8000 & 
          
          # Dá 3 segundos para o servidor subir
          sleep 3 
          
          # O '-f' faz o CI falhar se a API retornar erro (404, 500, etc)
          curl -f http://localhost:8000/
          curl -f http://localhost:8000/somar/10/20
          curl -f http://localhost:8000/multiplicar/5/5